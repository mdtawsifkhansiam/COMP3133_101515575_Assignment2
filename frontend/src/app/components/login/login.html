<div class="container mt-5">
    <h2>Login</h2>

    <input class="form-control mb-2" placeholder="Email" [(ngModel)]="email">
    <input class="form-control mb-2" type="password" placeholder="Password" [(ngModel)]="password">

    <button class="btn btn-primary" (click)="login()">Login</button>

    <p class="mt-3">
        Don't have account? <a routerLink="/signup">Signup</a>
    </p>
</div>
