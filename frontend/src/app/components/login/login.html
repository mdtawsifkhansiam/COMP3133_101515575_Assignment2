<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 card shadow p-4">
            <h2 class="text-center mb-4">Login</h2>

            <div *ngIf="message" [ngClass]="isError ? 'alert-danger' : 'alert-success'" class="alert text-center"
                role="alert">
                {{ message }}
            </div>

            <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input class="form-control" name="email" type="email" placeholder="Enter your email" ngModel
                        required email #email="ngModel" [class.is-invalid]="email.invalid && email.touched">
                    <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
                        Please provide a valid email.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" name="password" type="password" placeholder="Enter your password"
                        ngModel required #password="ngModel" [class.is-invalid]="password.invalid && password.touched">
                    <div class="invalid-feedback" *ngIf="password.invalid && password.touched">
                        Password is required.
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-primary" type="submit" [disabled]="loginForm.invalid">Login</button>
                </div>
            </form>

            <p class="mt-3 text-center">Don't have an account? <a routerLink="/signup">Signup</a></p>
        </div>
    </div>
</div>
