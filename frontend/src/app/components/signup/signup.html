<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card shadow p-4">
            <h2 class="text-center mb-4">Create Account</h2>

            <div *ngIf="message" [ngClass]="isError ? 'alert-danger' : 'alert-success'" class="alert text-center"
                role="alert">
                {{ message }}
            </div>

            <form #signupForm="ngForm" (ngSubmit)="signup(signupForm)">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input class="form-control" name="username" placeholder="Enter username" ngModel required
                        #username="ngModel" [class.is-invalid]="username.invalid && username.touched">
                    <div class="invalid-feedback" *ngIf="username.invalid && username.touched">Username is required.
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input class="form-control" name="email" type="email" placeholder="Enter email" ngModel required
                        email #email="ngModel" [class.is-invalid]="email.invalid && email.touched">
                    <div class="invalid-feedback" *ngIf="email.invalid && email.touched">Valid email is required.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" name="password" type="password" placeholder="Enter password" ngModel
                        required #password="ngModel" [class.is-invalid]="password.invalid && password.touched">
                    <div class="invalid-feedback" *ngIf="password.invalid && password.touched">Password is required.
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-success" type="submit" [disabled]="signupForm.invalid">Signup</button>
                </div>
            </form>

            <p class="mt-3 text-center">Already have an account? <a routerLink="/">Login</a></p>
        </div>
    </div>
</div>
