<div class="container mt-5">
    <h2>Signup</h2>

    <form #signupForm="ngForm" (ngSubmit)="signup(signupForm)">
        <div class="mb-2">
            <input class="form-control" name="username" placeholder="Username" ngModel required #username="ngModel">
            <small class="text-danger" *ngIf="username.invalid && username.touched">Username is required.</small>
        </div>

        <div class="mb-2">
            <input class="form-control" name="email" type="email" placeholder="Email" ngModel required email
                #email="ngModel">
            <small class="text-danger" *ngIf="email.invalid && email.touched">Valid email is required.</small>
        </div>

        <div class="mb-2">
            <input class="form-control" name="password" type="password" placeholder="Password" ngModel required
                #password="ngModel">
            <small class="text-danger" *ngIf="password.invalid && password.touched">Password is required.</small>
        </div>

        <button class="btn btn-success" type="submit" [disabled]="signupForm.invalid">Signup</button>
    </form>

    <p class="mt-3">Already have an account? <a routerLink="/">Login</a></p>
</div>
